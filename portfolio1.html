<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#5f2c82,#49a09d);
}


/* Navbar */

.navbar{
background:black;
padding:10px;
text-align:center;
}

.navbar a{
color:white;
margin:15px;
text-decoration:none;
font-size:18px;
}

.navbar a:hover{
color:yellow;
}


/* Container */

.container{
width:80%;
margin:40px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px black;
animation:fade 1s;
}


@keyframes fade{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}


h1{
text-align:center;
}


/* Grid */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}


/* Card */

.card{
background:#f9f9f9;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 5px gray;
transition:0.4s;
text-align:center;
}


.card img{
width:100%;
height:150px;
}


.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px purple;
}


button{
margin:10px;
padding:6px 12px;
background:purple;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
a:link {
  color: rgb(255, 255, 255); /* Color for unvisited links */
}

a:visited {
  color: rgb(255, 255, 255); /* Color for visited links */
}

a:hover {
  color: rgb(255, 255, 255); /* Color when the user mouses over the link */
}

a:active {
  color: rgb(255, 255, 255); /* Color the moment a link is clicked */
}
a{
    text-decoration: none;
}


</style>

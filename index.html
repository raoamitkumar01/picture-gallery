<!DOCTYPE html>
<html>
<head>

<title>Real Gallery</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background:#f0f0f0;
}


/* Navbar */

.navbar{
    background:#222;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.navbar a{
    color:white;
    margin:10px;
    text-decoration:none;
}


/* Heading */

h1{
    text-align:center;
    margin:20px;
}


/* Gallery */

.gallery{

    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:15px;
    padding:20px;
}


/* Box */

.box{
    background:white;
    border-radius:5px;
    overflow:hidden;
    box-shadow:0 0 5px gray;
}


/* Image */

.box img{
    width:100%;
    height:180px;
    transition:0.5s;
}

.box:hover img{
    transform:scale(1.1);
}


/* Text */

.box p{
    text-align:center;
    padding:5px;
    font-weight:bold;
}

</style>

</head>
<body>


<div class="navbar">

<div>My Gallery</div>

<div>
<a href="#">Home</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</div>

</div>


<h1>Picture Gallery</h1>

</body>
</html>
